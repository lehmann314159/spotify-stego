<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotify Stego</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>Spotify Stego</h1>
    <p class="subtitle">Hide messages inside musically coherent playlists</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" onclick="showTab('encode', this)">Encode</button>
    <button class="tab" onclick="showTab('decode', this)">Decode</button>
  </nav>

  <main>
    <section id="encode-tab" class="tab-panel active">
      {{template "encode.html" .}}
    </section>
    <section id="decode-tab" class="tab-panel">
      {{template "decode.html" .}}
    </section>
  </main>

  <script>
    function showTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.getElementById(name + '-tab').classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
