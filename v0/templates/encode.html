{{define "encode.html"}}
<form hx-post="/encode" hx-target="#encode-results" hx-swap="innerHTML" hx-indicator="#encode-spinner">
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="3" placeholder="Your secret message…" maxlength="900" required></textarea>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="genre">Genre</label>
      <select id="genre" name="genre">
        <option value="pop">Pop</option>
        <option value="rock">Rock</option>
        <option value="hip-hop">Hip-Hop</option>
        <option value="electronic">Electronic</option>
        <option value="jazz">Jazz</option>
        <option value="classical">Classical</option>
        <option value="r&b">R&amp;B</option>
        <option value="country">Country</option>
      </select>
    </div>
  </div>

  <fieldset>
    <legend>Secret Keywords</legend>
    <div class="form-row">
      <div class="form-group">
        <label for="k1">Keyword 1</label>
        <input id="k1" name="k1" type="text" required placeholder="e.g. sunrise">
      </div>
      <div class="form-group">
        <label for="k2">Keyword 2</label>
        <input id="k2" name="k2" type="text" required placeholder="e.g. delta">
      </div>
      <div class="form-group">
        <label for="k3">Keyword 3</label>
        <input id="k3" name="k3" type="text" required placeholder="e.g. tango">
      </div>
    </div>
  </fieldset>

  <button type="submit" class="btn-primary">
    <span id="encode-spinner" class="htmx-indicator">Encoding…</span>
    <span class="btn-label">Encode</span>
  </button>
</form>

<div id="encode-results"></div>
{{end}}
